name: Deploy IPMR Toolkit to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow workflow to write Pages content and read repo
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs of older commits
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for git-revision-date plugins if added later

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs==1.6.1 \
            mkdocs-material==9.7.6 \
            mkdocs-mermaid2-plugin==1.2.3 \
            pymdown-extensions==10.21.2

      - name: Build site
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
